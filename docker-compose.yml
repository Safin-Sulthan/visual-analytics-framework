services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    depends_on:
      - redis

  ai-engine:
    build: ./ai-engine
    ports:
      - '8000:8000'
    env_file:
      - ./ai-engine/.env

  redis-worker:
    build: ./redis-worker
    env_file:
      - ./redis-worker/.env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
